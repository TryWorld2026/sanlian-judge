# Netlify 部署配置 - 赛博判官
# 项目根目录包含 index.html + static/ + api/ + netlify/functions/

[build]
  # 前端静态文件就在项目根目录(index.html + static/)
  publish = "."
  # Python Functions 目录(每个 .py 一个 function)
  functions = "netlify/functions"
  # 安装 Python 依赖到 Netlify 提供的 site-packages
  command = "pip install -r requirements.txt"

[build.environment]
  PYTHON_VERSION = "3.11"

# 路由:把所有 /api/* 重写到对应的 netlify functions
[[redirects]]
  from = "/api/profile"
  to = "/.netlify/functions/profile"
  status = 200
  force = true

[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200
  force = true

[[redirects]]
  from = "/api/rank"
  to = "/.netlify/functions/rank"
  status = 200
  force = true

# SPA fallback:所有未匹配的路径都回退到 index.html
# 注意:必须放在 /api/* 重写规则之后,否则 /api/* 会被这里吃掉
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 安全头 + 静态资源缓存
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
