# Netlify 部署配置 - sanlian-judge

[build]
  publish = "."
  functions = "netlify/functions"
  command = "pip install -r requirements.txt"

[build.environment]
  PYTHON_VERSION = "3.11"

[[redirects]]
  from = "/api/avatar"
  to = "/.netlify/functions/avatar"
  status = 200
  force = true

[[redirects]]
  from = "/api/profile"
  to = "/.netlify/functions/profile"
  status = 200
  force = true

[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200
  force = true

[[redirects]]
  from = "/api/rank"
  to = "/.netlify/functions/rank"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
